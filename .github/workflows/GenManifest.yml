name: "Generate & Validate Manifests"

# ─────────────────────────────────────────────────────────────────────────────
# Reads installer metadata from moku/<version>.json, uses wingetcreate to
# produce the three YAML manifest files, post-processes them (ReleaseDate,
# ReleaseNotes), validates with `winget validate`, then commits the result to
#   manifests/m/Moku/Moku/<version>/
#
# Does NOT submit a PR – inspect the committed manifests first, then run
# workflow 3 when you're happy.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version to generate manifests for, e.g. 0.9.1.
          Leave empty to use latestVersion from moku/meta.json.
        required: false
        type: string

jobs:
  generate-manifests:
    runs-on: windows-latest        # wingetcreate + winget both require Windows
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Resolve version & read version JSON ─────────────────────────────
      - name: Resolve version and load metadata
        id: meta
        shell: pwsh
        run: |
          $metaRaw  = Get-Content moku/meta.json -Raw | ConvertFrom-Json
          $version  = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $metaRaw.latestVersion
          }

          $vFile = "moku/$version.json"
          if (-not (Test-Path $vFile)) {
            Write-Error "Version file '$vFile' not found. Run workflow 1 (Update Metadata) first."
            exit 1
          }

          $vdata = Get-Content $vFile -Raw | ConvertFrom-Json

          "version=$version"                         >> $env:GITHUB_OUTPUT
          "installer_url=$($vdata.installerUrl)"     >> $env:GITHUB_OUTPUT
          "release_notes_url=$($vdata.releaseNotesUrl)" >> $env:GITHUB_OUTPUT
          "published_at=$($vdata.publishedAt)"       >> $env:GITHUB_OUTPUT

          # Stash multi-line release notes to a temp file
          $vdata.releaseNotes | Set-Content "$env:TEMP\release_notes.txt" -Encoding UTF8

          Write-Host "✓ Generating manifests for Moku $version"
          Write-Host "  Installer : $($vdata.installerUrl)"

      # ── 3. Install wingetcreate ────────────────────────────────────────────
      - name: Install wingetcreate
        shell: pwsh
        run: |
          Write-Host "Downloading wingetcreate…"
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" `
                            -OutFile wingetcreate.exe `
                            -UseBasicParsing
          # NOTE: wingetcreate exits 1 for every info/version subcommand — skip the
          # version check. The update step below is the real proof it works.
          if (-not (Test-Path wingetcreate.exe)) {
            Write-Error "wingetcreate.exe not found after download."
            exit 1
          }
          Write-Host "✓ wingetcreate.exe downloaded ($('{0:N0}' -f (Get-Item wingetcreate.exe).Length) bytes)"

      # ── 4. Generate manifests ──────────────────────────────────────────────
      - name: Run wingetcreate update
        id: generate
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version      = "${{ steps.meta.outputs.version }}"
          $installerUrl = "${{ steps.meta.outputs.installer_url }}"
          $rnUrl        = "${{ steps.meta.outputs.release_notes_url }}"

          Write-Host "Running wingetcreate update…"
          & .\wingetcreate.exe update Moku.Moku `
              --version             $version `
              --urls                $installerUrl `
              --release-notes-url   $rnUrl `
              --out                 . `
              --token               $env:GH_TOKEN

          if ($LASTEXITCODE -ne 0) {
            Write-Error "wingetcreate exited with code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          $manifestDir = "manifests/m/Moku/Moku/$version"
          if (-not (Test-Path $manifestDir)) {
            # wingetcreate sometimes places output elsewhere – search for it
            $found = Get-ChildItem -Recurse -Filter "Moku.Moku.yaml" | Select-Object -First 1
            if ($found) {
              Write-Host "Found manifests at: $($found.DirectoryName)"
              $manifestDir = $found.DirectoryName
            } else {
              Write-Error "Could not find generated manifest files."
              exit 1
            }
          }

          "manifest_dir=$manifestDir" >> $env:GITHUB_OUTPUT
          Write-Host "✓ Manifests generated:"
          Get-ChildItem $manifestDir | Format-Table Name, Length

      # ── 5. Post-process: inject ReleaseDate ────────────────────────────────
      - name: Inject ReleaseDate into installer manifest
        shell: pwsh
        run: |
          $manifestDir  = "${{ steps.generate.outputs.manifest_dir }}"
          $releaseDate  = "${{ steps.meta.outputs.published_at }}"
          $installerYaml = "$manifestDir/Moku.Moku.installer.yaml"

          $content = Get-Content $installerYaml -Raw
          if ($content -notmatch "^ReleaseDate:" -and $content -notmatch "`nReleaseDate:") {
            $content = $content -replace "(^ManifestType:)", "ReleaseDate: $releaseDate`n`$1"
            Set-Content $installerYaml $content -NoNewline
            Write-Host "✓ Added ReleaseDate: $releaseDate"
          } else {
            Write-Host "  ReleaseDate already present – skipping"
          }

          Write-Host ""
          Write-Host "════════ Moku.Moku.installer.yaml (after ReleaseDate step) ════════"
          Get-Content $installerYaml
          Write-Host "════════════════════════════════════════════════════════════════════"

      # ── 6. Post-process: inject inline ReleaseNotes into locale manifest ───
      - name: Inject ReleaseNotes into locale manifest
        shell: pwsh
        run: |
          $manifestDir = "${{ steps.generate.outputs.manifest_dir }}"
          $localeYaml  = "$manifestDir/Moku.Moku.locale.en-US.yaml"
          $notesFile   = "$env:TEMP\release_notes.txt"

          if (-not (Test-Path $notesFile)) {
            Write-Host "  No release notes file found – skipping"
          } else {
            $notes   = Get-Content $notesFile -Raw
            $content = Get-Content $localeYaml -Raw

            if ([string]::IsNullOrWhiteSpace($notes)) {
              Write-Host "  Release notes body is empty – skipping"
            } elseif ($content -match "ReleaseNotes:") {
              Write-Host "  ReleaseNotes already present – skipping"
            } else {
              # Indent every line by 2 spaces for the YAML block-scalar body.
              # Use Windows line endings consistently with what wingetcreate wrote.
              $lines    = $notes.Trim() -split "`r?`n"
              $indented = ($lines | ForEach-Object { "  $_" }) -join "`n"
              $yamlBlock = "ReleaseNotes: |-`n$indented"

              # Insert immediately before ReleaseNotesUrl
              if ($content -match "ReleaseNotesUrl:") {
                $content = $content -replace "(?m)(^ReleaseNotesUrl:)", "$yamlBlock`n`$1"
              } else {
                $content = $content -replace "(?m)(^ManifestType:)", "$yamlBlock`n`$1"
              }

              Set-Content $localeYaml $content -NoNewline
              Write-Host "✓ Injected ReleaseNotes into locale manifest"
            }
          }

          Write-Host ""
          Write-Host "════════ Moku.Moku.locale.en-US.yaml (after ReleaseNotes step) ════════"
          Get-Content $localeYaml
          Write-Host "══════════════════════════════════════════════════════════════════════"

      # ── 7. Validate with winget ────────────────────────────────────────────
      - name: Validate manifests with winget
        shell: pwsh
        run: |
          $manifestDir = "${{ steps.generate.outputs.manifest_dir }}"

          Write-Host "Running: winget validate --manifest $manifestDir"
          & winget.exe validate --manifest $manifestDir 2>&1 | Tee-Object -Variable output
          $exitCode = $LASTEXITCODE

          # Exit codes:
          #   0            = validation passed, no warnings
          #  -1978335192   = 0x89A10008 = passed WITH warnings (schema comment URL
          #                  format, cosmetic only – safe to proceed)
          # anything else  = genuine failure
          $WARNING_EXIT = -1978335192
          $WARNING_EXIT_SIGNED   = -1978335192
          $WARNING_EXIT_UNSIGNED = 2316632104
          if ($exitCode -eq 0) {
            Write-Host "✓ Validation passed (no warnings)"
          } elseif ($exitCode -eq $WARNING_EXIT) {
            exit 0
          } elseif (($exitCode -eq $WARNING_EXIT_SIGNED) -or ($exitCode -eq $WARNING_EXIT_UNSIGNED)) {
            Write-Host "⚠ Validation passed with warnings (schema header comment – harmless)."
            Write-Host "  wingetcreate already confirmed the manifest is valid above."
            exit 0
          } else {
            Write-Error "winget validate failed (exit $exitCode). Fix the manifests before proceeding."
            exit $exitCode
          }

      # ── 8. Show final manifest content ────────────────────────────────────
      - name: Display final manifests
        shell: pwsh
        run: |
          $manifestDir = "${{ steps.generate.outputs.manifest_dir }}"
          foreach ($file in (Get-ChildItem $manifestDir -Filter "*.yaml" | Sort-Object Name)) {
            Write-Host ""
            Write-Host "════════ $($file.Name) ════════"
            Get-Content $file.FullName
            Write-Host "════════════════════════════════"
          }

      # ── 9. Commit and push ─────────────────────────────────────────────────
      - name: Commit & push manifests
        shell: pwsh
        run: |
          $version     = "${{ steps.meta.outputs.version }}"
          $manifestDir = "${{ steps.generate.outputs.manifest_dir }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add $manifestDir
          $status = git status --porcelain
          if ([string]::IsNullOrWhiteSpace($status)) {
            Write-Host "Nothing changed – manifests already committed."
          } else {
            git commit -m "feat(manifests): generate Moku.Moku v$version"
            git push
            Write-Host "✓ Manifests committed and pushed for v$version"
            Write-Host ""
            Write-Host "Next step: review the files in $manifestDir, then"
            Write-Host "run workflow '3 · Submit PR to winget-pkgs' when ready."
          }