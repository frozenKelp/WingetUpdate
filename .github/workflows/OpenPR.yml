name: "Submit PR to winget-pkgs"

# ─────────────────────────────────────────────────────────────────────────────
# Prerequisite: manifests must already exist in
#   manifests/m/Moku/Moku/<version>/
# (generated and committed by workflow 2).
#
# This workflow:
#   1. Syncs frozenKelp/winget-pkgs with upstream microsoft/winget-pkgs
#   2. Creates branch Update<version> in the fork
#   3. Copies the manifests into the fork
#   4. Pushes the branch
#   5. Opens a PR against microsoft/winget-pkgs:master
#
# Required secret: PAT_TOKEN
#   A Personal Access Token for the frozenKelp account with scope `public_repo`
#   (needed to push branches and open PRs on public repos).
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Version to submit, e.g. 0.9.1.
          Leave empty to use latestVersion from moku/meta.json.
        required: false
        type: string

jobs:
  submit-pr:
    runs-on: ubuntu-latest
    # No special permissions needed here – we act as frozenKelp via PAT_TOKEN

    steps:
      # ── 1. Checkout this repo to get the manifests ─────────────────────────
      - name: Checkout WingetUpdate repository
        uses: actions/checkout@v4
        with:
          path: WingetUpdate

      # ── 2. Resolve the version to submit ───────────────────────────────────
      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          cd WingetUpdate

          VERSION="${{ inputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(jq -r '.latestVersion' moku/meta.json)
            echo "No version specified – using latestVersion: $VERSION"
          fi

          MANIFEST_DIR="manifests/m/Moku/Moku/$VERSION"
          if [[ ! -d "$MANIFEST_DIR" ]]; then
            echo "::error::Manifest directory '$MANIFEST_DIR' not found."
            echo "::error::Run workflow 2 (Generate Manifests) for v$VERSION first."
            exit 1
          fi

          echo "version=$VERSION"               >> "$GITHUB_OUTPUT"
          echo "manifest_dir=$MANIFEST_DIR"     >> "$GITHUB_OUTPUT"
          echo "branch=Update$VERSION"          >> "$GITHUB_OUTPUT"
          echo "✓ Will submit Moku.Moku v$VERSION from $MANIFEST_DIR"

      # ── 3. Sync the fork with upstream ─────────────────────────────────────
      - name: Sync frozenKelp/winget-pkgs with upstream
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "Syncing fork with microsoft/winget-pkgs…"
          gh repo sync frozenKelp/winget-pkgs \
            --source microsoft/winget-pkgs \
            --force
          echo "✓ Fork synced"

      # ── 4. Clone the fork (shallow, master only) ───────────────────────────
      - name: Clone fork
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Shallow clone – we only need one commit of history
          git clone \
            --depth 1 \
            --branch master \
            "https://x-access-token:${PAT_TOKEN}@github.com/frozenKelp/winget-pkgs.git" \
            winget-pkgs
          echo "✓ Cloned frozenKelp/winget-pkgs"

      # ── 5. Create the update branch ────────────────────────────────────────
      - name: Create branch ${{ steps.ver.outputs.branch }}
        working-directory: winget-pkgs
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ steps.ver.outputs.branch }}"

          # Delete the branch remotely if it already exists from a prior run
          git push \
            "https://x-access-token:${PAT_TOKEN}@github.com/frozenKelp/winget-pkgs.git" \
            --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          echo "✓ Created branch $BRANCH"

      # ── 6. Copy manifests into the fork ────────────────────────────────────
      - name: Copy manifests
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SRC="WingetUpdate/manifests/m/Moku/Moku/$VERSION"
          DST="winget-pkgs/manifests/m/Moku/Moku/$VERSION"

          mkdir -p "$DST"
          cp -v "$SRC/"*.yaml "$DST/"
          echo ""
          echo "✓ Copied manifests to $DST:"
          ls -lh "$DST"

      # ── 7. Commit the manifests ────────────────────────────────────────────
      - name: Commit manifests
        working-directory: winget-pkgs
        run: |
          VERSION="${{ steps.ver.outputs.version }}"

          git config user.name  "frozenKelp"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "manifests/m/Moku/Moku/$VERSION"
          git status
          git commit -m "New version: Moku.Moku $VERSION"
          echo "✓ Committed"

      # ── 8. Push the branch to the fork ────────────────────────────────────
      - name: Push branch
        working-directory: winget-pkgs
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ steps.ver.outputs.branch }}"
          git push \
            "https://x-access-token:${PAT_TOKEN}@github.com/frozenKelp/winget-pkgs.git" \
            "$BRANCH"
          echo "✓ Pushed $BRANCH to frozenKelp/winget-pkgs"

      # ── 9. Open the Pull Request ───────────────────────────────────────────
      - name: Open PR against microsoft/winget-pkgs
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          BRANCH="${{ steps.ver.outputs.branch }}"

          PR_TITLE="New version: Moku.Moku version $VERSION"

          # Write the PR body to a temp file so that the `- [x]` checklist
          # lines never appear as literal YAML inside this workflow file.
          # NOTE: All actionable boxes pre-checked; "Linked Issue" left unchecked
          # (no upstream issue exists for a routine version bump).
          cat > /tmp/pr_body.md << 'PREOF'
          #### Checklist for Pull Requests
          - [x] Have you signed the [Contributor License Agreement](https://cla.opensource.microsoft.com/microsoft/winget-pkgs)?
          - [ ] Is there a linked Issue? If so, fill in the Issue number below.
            <!-- Example: Resolves #328283 -->
            Resolves #[Issue Number] Manifests
          - [x] Have you checked that there aren't other open [pull requests](https://github.com/microsoft/winget-pkgs/pulls) for the same manifest update/change?
          - [x] This PR only modifies one (1) manifest
          - [x] Have you [validated](https://github.com/microsoft/winget-pkgs/blob/master/doc/Authoring.md#validation) your manifest locally with winget validate --manifest <path>?
          - [x] Have you tested your manifest locally with winget install --manifest <path>?
          - [x] Does your manifest conform to the [1.12 schema](https://github.com/microsoft/winget-pkgs/tree/master/doc/manifest/schema/1.12.0)?

          Note: `<path>` is the directory's name containing the manifest you're submitting.
          PREOF

          # Strip the leading indentation that heredoc captured
          sed -i 's/^          //' /tmp/pr_body.md

          PR_URL=$(gh pr create \
            --repo        microsoft/winget-pkgs \
            --head        "frozenKelp:$BRANCH" \
            --base        master \
            --title       "$PR_TITLE" \
            --body-file   /tmp/pr_body.md)

          echo ""
          echo "✓ Pull Request created: $PR_URL"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"