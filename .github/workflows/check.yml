name: 1. Moku Update Checker

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  check-and-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Latest Release from Upstream
        id: get_latest
        run: |
          # Fetch the latest tag name from GitHub API
          RESPONSE=$(curl -sL https://api.github.com/repos/Youwes09/Moku/releases/latest)
          LATEST_TAG=$(echo "$RESPONSE" | jq -r .tag_name)
          
          # Fail check: If API returns null or empty, the upstream might be down or rate-limited
          if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "::error::Could not fetch latest release. API might be rate-limited or repo moved."
            exit 1
          fi
          
          echo "latest=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Read Tracked Version
        id: get_current
        run: |
          VERSION_FILE="moku/current_version.txt"
          
          # Check if file exists and has content
          if [ -f "$VERSION_FILE" ]; then
            CURRENT_VAL=$(cat "$VERSION_FILE")
          else
            CURRENT_VAL="none"
          fi
          
          # Clean whitespace/newlines
          CURRENT_VAL=$(echo "$CURRENT_VAL" | xargs)
          
          echo "current=$CURRENT_VAL" >> $GITHUB_OUTPUT

      - name: Compare and Execute
        id: decision
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          LATEST: ${{ steps.get_latest.outputs.latest }}
          CURRENT: ${{ steps.get_current.outputs.current }}
        run: |
          echo "Upstream: $LATEST"
          echo "Local: $CURRENT"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "UPDATE_NEEDED=true" >> $GITHUB_ENV
            echo "Match failure or 'none' detected. Triggering update to $LATEST."
            
            # Trigger the publisher workflow
            gh workflow run publisher.yml -f version="$LATEST"
          else
            echo "Versions match. No action needed."
          fi

      - name: Update Tracked File & Commit
        if: ${{ env.UPDATE_NEEDED == 'true' }}
        run: |
          # Ensure directory exists
          mkdir -p moku
          
          # Overwrite version file with the new tag
          echo "${{ steps.get_latest.outputs.latest }}" > moku/current_version.txt
          
          # Git configuration
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and Push
          git add moku/current_version.txt
          git commit -m "chore(moku): update tracked version to ${{ steps.get_latest.outputs.latest }}"
          git push
